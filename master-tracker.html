<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #121212;
    color: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .wrap {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 1000px;
  }
  .card {
    background: #1c1c1c;
    border: 1px solid #2e2e2e;
    border-radius: 14px;
    padding: 32px;
    width: 420px;
    max-width: 100%;
  }
  .card h2 {
    font-size: 22px;
    letter-spacing: 0.5px;
    padding-bottom: 16px;
    margin-bottom: 8px;
    border-bottom: 1px solid #333;
  }
  label {
    display: block;
    margin-top: 20px;
    margin-bottom: 8px;
    color: #9a9a9a;
    font-size: 15px;
  }
  input, select {
    width: 100%;
    background: #181818;
    border: 1px solid #383838;
    border-radius: 8px;
    color: #f5f5f5;
    padding: 14px;
    font-size: 15px;
    outline: none;
  }
  input:focus, select:focus { border-color: #4caf50; }
  input::placeholder { color: #6a6a6a; }
  button {
    width: 100%;
    margin-top: 28px;
    background: #43a047;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  button:hover { background: #4caf50; }
  button:disabled { background: #555; cursor: wait; }
</style>
</head>
<body>

<div class="wrap">

  <!-- AUDIO CARD -->
  <div class="card">
    <h2>H.N.I BEATZ (AUDIO)</h2>

    <label>Track Name</label>
    <input type="text" id="track_name" placeholder="e.g. Midnight Drive">

    <label>BPM</label>
    <input type="number" id="bpm" placeholder="e.g. 80">

    <label>Status</label>
    <select id="audio_status">
      <option>Pending</option>
      <option>Released</option>
      <option>Licensed</option>
      <option>Draft</option>
    </select>

    <label>Platform Link</label>
    <input type="text" id="platform_link" placeholder="Leave blank if pending">

    <button onclick="sendData('Audio', this)">LOG TO MASTER TRACKER</button>
  </div>

  <!-- PHYSICAL CARD -->
  <div class="card">
    <h2>COLLECTIVE ESSENCE (PHYSICAL)</h2>

    <label>Item Name</label>
    <input type="text" id="item_name" placeholder="e.g. Grounded Edison 001">

    <label>Product Line</label>
    <select id="product_line">
      <option>Lamp</option>
      <option>Jewelry</option>
      <option>Home Decor</option>
    </select>

    <label>Price</label>
    <input type="number" id="price" placeholder="e.g. 150">

    <label>Item Status</label>
    <select id="item_status">
      <option>Workbench</option>
      <option>Listed</option>
      <option>Sold</option>
      <option>Shipped</option>
    </select>

    <button onclick="sendData('Physical', this)">LOG TO MASTER TRACKER</button>
  </div>

</div>

<script>
  // ============================================================
  //  PASTE YOUR AIRTABLE WEBHOOK URL BETWEEN THE QUOTES BELOW.
  //  Get it from: Airtable > Automations > "When webhook received" trigger.
  // ============================================================
  const WEBHOOK_URL = 'https://hooks.airtable.com/workflows/v1/genericWebhook/appbtVx5MO7rbYjL5/wflpE0WgmI8mRTirL/wtreZIJemH9ujCP4R';
  // ============================================================

  function sendData(type, btn) {
    if (!WEBHOOK_URL || WEBHOOK_URL === 'YOUR_URL_GOES_HERE') {
      alert("Please paste your Airtable Webhook URL in the code first (top of the <script> block).");
      return;
    }

    let payload = { type: type };

    if (type === 'Audio') {
      payload.track_name    = document.getElementById('track_name').value;
      payload.bpm           = document.getElementById('bpm').value;
      payload.status        = document.getElementById('audio_status').value;
      payload.platform_link = document.getElementById('platform_link').value;
    } else {
      payload.item_name    = document.getElementById('item_name').value;
      payload.product_line = document.getElementById('product_line').value;
      payload.price        = document.getElementById('price').value;
      payload.item_status  = document.getElementById('item_status').value;
    }

    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = 'SENDING...';

    fetch(WEBHOOK_URL, {
      method: 'POST',
      body: JSON.stringify(payload),
      headers: { 'Content-Type': 'application/json' }
    })
    .then(response => {
      if (response.ok) {
        alert("Success! Sent to Airtable.");
        // clear only this card's fields
        const card = btn.closest('.card');
        card.querySelectorAll('input').forEach(el => el.value = '');
      } else {
        alert("Error sending to Airtable (status " + response.status + ").");
      }
    })
    .catch(err => alert("Network error: " + err.message))
    .finally(() => {
      btn.disabled = false;
      btn.textContent = original;
    });
  }
</script>

</body>
</html>
